name: Daily Data Ingestion

on:
  schedule:
    # 05:00 UTC is 10:30 AM IST
    - cron: '0 5 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Required to allow pushing changes back to the repo
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Run data ingestion pipeline
        run: |
          npm run ingest > ingest.log 2>&1 || (cat ingest.log && exit 1)

      - name: Check and Commit
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/processed/vector_store.json data/metadata.json
          if git diff-index --quiet HEAD --; then
            echo "No changes to commit in vector store or metadata."
          else
            git commit -m "chore(data): auto-update scraped fund data [skip ci]"
            git push origin main
          fi
